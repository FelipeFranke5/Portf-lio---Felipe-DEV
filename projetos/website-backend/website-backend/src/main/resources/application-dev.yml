# ═══════════════════════════════════════════════════════
#  Perfil de desenvolvimento local
#  Ativo com: -Dspring.profiles.active=dev
#  ou via SPRING_PROFILES_ACTIVE=dev no docker-compose.dev.yml
# ═══════════════════════════════════════════════════════

spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Em dev, mostra detalhes de saúde sem autenticação
management:
  endpoint:
    health:
      show-details: always

# Logs mais detalhados em dev
logging:
  level:
    dev.franke.felipe: DEBUG
    org.springframework.security: DEBUG   # Ver o fluxo de autorização
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
